# behat.yml
default:
  autoload:
    - "%paths.base%/tests/Behat"
  suites:
    ldap:
      paths:
        - "%paths.base%/tests/Behat"
      contexts:
        - "Tests\\Behat\\ExampleContext"
  extensions:
      Behat\MinkExtension:
#        Must comment-out for BEHAT_PARAMS to be effective
#        base_url: 'http://localhost'
        sessions:
          default:
            goutte: ~

local:
  extensions:
      Behat\MinkExtension:
        base_url: 'http://localhost'

homestead:
  extensions:
      Behat\MinkExtension:
        base_url: 'http://cruftman.local'

docker:
  extensions:
      Behat\MinkExtension:
        base_url: 'http://http-service'
